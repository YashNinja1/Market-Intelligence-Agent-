version: '3.9'

services:

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: market_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: market_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./market-agent/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Ollama for local AI agents
  ollama:
    image: ollama/ollama:latest
    container_name: market_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # FastAPI backend
  backend:
    build: ./market-agent
    container_name: market_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/market_agent
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY}
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Next.js frontend
  frontend:
    build: ./market-agent-ui
    container_name: market_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data: